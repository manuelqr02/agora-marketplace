<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>¡Te han referido!</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 420px;
      width: 100%;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 40px 30px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
    }

    .app-icon {
      width: 100px;
      height: 100px;
      background: white;
      border-radius: 20px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 12px;
      font-weight: 700;
    }

    p {
      font-size: 17px;
      opacity: 0.9;
      margin-bottom: 30px;
    }

    .referral-code {
      background: rgba(255, 255, 255, 0.2);
      border: 2px dashed rgba(255, 255, 255, 0.6);
      border-radius: 16px;
      padding: 20px;
      margin: 30px 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 4px;
    }

    .download-btn {
      background: white;
      color: #667eea;
      font-size: 18px;
      font-weight: 600;
      padding: 16px 40px;
      border: none;
      border-radius: 50px;
      width: 100%;
      cursor: pointer;
      margin-top: 10px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      transition: transform 0.2s;
    }

    .download-btn:active {
      transform: scale(0.95);
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #000000dd;
      color: white;
      padding: 14px 24px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 500;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      opacity: 0;
      transition: all 0.3s;
      z-index: 1000;
    }

    .footer {
      margin-top: 40px;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <div class="app-icon"><!-- Reemplaza esta sección completa -->

  <img src="logoapp.png" alt="Logo de la App" style="width: 100%; height: 100%; object-fit: contain; border-radius: 20px;">
</div>
      
      <h1>¡Te han referido!</h1>
      <p>Pega tu codigo al registrarte en la app y Disfruta del Beneficio</p>

      <div class="referral-code" id="referralCode">
        CÓDIGO
      </div>

      <button class="download-btn" id="downloadBtn">
        Descargar la App
      </button>

      <div class="footer">
        Disponible en Android e iOS
      </div>
    </div>
  </div>

  <!-- Toast de confirmación -->
  <div class="toast" id="toast">
    ✅ Copiado
  </div>

  <script>
    // Obtener código de referido desde la URL
    function getReferralCode() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('ref') || urlParams.get('codigo') || urlParams.get('r') || "SIN-CODIGO";
    }

    const code = getReferralCode();
    const codeElement = document.getElementById('referralCode');
    codeElement.textContent = code;

    // Función para copiar al portapapeles
    function copyToClipboard(text) {
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(() => {
          showToast();
        }).catch(() => {
          fallbackCopy(text);
        });
      } else {
        fallbackCopy(text);
      }
    }

    function fallbackCopy(text) {
      const textArea = document.createElement("textarea");
      textArea.value = text;
      textArea.style.position = "fixed";
      textArea.style.left = "-999999px";
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();
      document.execCommand('copy');
      document.body.removeChild(textArea);
      showToast();
    }

    function showToast() {
      const toast = document.getElementById('toast');
      toast.style.opacity = "1";
      toast.style.transform = "translateX(-50%) translateY(0)";
      
      setTimeout(() => {
        toast.style.opacity = "0";
        toast.style.transform = "translateX(-50%) translateY(20px)";
      }, 2500);
    }

    // Copiar automáticamente al cargar la página
    window.onload = function() {
      if (code !== "SIN-CODIGO") {
        copyToClipboard(code);
      }
    };

    // Botón de descarga
    document.getElementById('downloadBtn').addEventListener('click', function() {
      const userAgent = navigator.userAgent.toLowerCase();
      
      // Cambia estos enlaces por los de tu app
      const playStoreLink = "https://play.google.com/store/apps/details?id=com.martini.agora";
      const appStoreLink = "https://apps.apple.com/app/tu-app/id1234567890";

      if (/android/.test(userAgent)) {
        window.location.href = playStoreLink;
      } else if (/iphone|ipad|ipod/.test(userAgent)) {
        window.location.href = appStoreLink;
      } else {
        window.location.href = playStoreLink;
      }
    });
  </script>

</body>
</html>
