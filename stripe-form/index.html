<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Pago Seguro</title>

  <!-- Preconectar a Stripe antes de que el script lo necesite -->
  <link rel="preconnect" href="https://js.stripe.com">
  <link rel="preconnect" href="https://api.stripe.com">
  <link rel="dns-prefetch" href="https://js.stripe.com">
  <link rel="dns-prefetch" href="https://api.stripe.com">

  <!-- Cargar Stripe.js lo antes posible -->
  <script src="https://js.stripe.com/v3/" async></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f3ff;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 12px;
    }
    .card {
      background: white;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(108,71,255,0.10);
      width: 100%;
      max-width: 420px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    h2 { color: #1a1033; font-size: 17px; font-weight: 600; }
    .amount { color: #6c47ff; font-size: 26px; font-weight: 700; }
    .currency-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      color: #6c47ff;
      background: #f0ebff;
      border-radius: 6px;
      padding: 2px 7px;
      margin-left: 6px;
      vertical-align: middle;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Skeleton mientras carga */
    #skeleton { display: block; }
    .sk-line {
      background: linear-gradient(90deg, #f0ebff 25%, #e5e0ff 50%, #f0ebff 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .sk-field { height: 44px; }
    .sk-btn   { height: 46px; margin-top: 4px; border-radius: 10px; }
    .sk-half  { height: 44px; width: 48%; display: inline-block; }
    .sk-row   { display: flex; gap: 10px; margin-bottom: 10px; }
    .sk-row .sk-half { margin-bottom: 0; flex: 1; }

    #payment-element { margin-bottom: 14px; }
    button#submit-btn {
      background: #6c47ff;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 13px;
      width: 100%;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }
    button#submit-btn:hover { background: #4b2fcc; }
    button#submit-btn:disabled { background: #a094d8; cursor: not-allowed; }
    #error-message {
      color: #dc2626;
      font-size: 13px;
      margin-top: 10px;
      padding: 9px 12px;
      background: #fef2f2;
      border-radius: 8px;
      display: none;
      border-left: 3px solid #dc2626;
    }
    #success-message {
      color: #059669;
      font-size: 14px;
      margin-top: 10px;
      padding: 12px;
      background: #ecfdf5;
      border-radius: 8px;
      text-align: center;
      display: none;
    }
    .lock-icon { font-size: 11px; color: #9ca3af; text-align: center; margin-top: 12px; }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #e5e0ff;
      border-top-color: #6c47ff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #form-container { display: none; }
    #error-screen { display: none; color: #dc2626; font-size: 13px; padding: 20px 0; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h2>Pago Seguro &#128274;</h2>
      <div>
        <span class="amount" id="amount-display">$0.00</span>
        <span class="currency-badge" id="currency-badge">usd</span>
      </div>
    </div>

    <!-- Skeleton visible mientras carga Stripe -->
    <div id="skeleton">
      <div class="sk-line sk-field"></div>
      <div class="sk-row">
        <div class="sk-line sk-half"></div>
        <div class="sk-line sk-half"></div>
      </div>
      <div class="sk-line sk-btn"></div>
    </div>

    <!-- Formulario real -->
    <div id="form-container">
      <div id="payment-element"></div>
      <button id="submit-btn">Pagar ahora</button>
      <div id="error-message"></div>
      <div id="success-message">&#9989; &#161;Pago exitoso! Gracias por tu compra.</div>
      <p class="lock-icon">&#128274; Procesado con Stripe. Tus datos estan seguros.</p>
    </div>

    <div id="error-screen">&#9888; Error al cargar. Vuelve a intentarlo.</div>
  </div>

  <script>
    const STRIPE_PK = 'pk_test_51LLPZSAyqyVgaUlbXbj2SLEI5GSm4ja4tiz7mJB2gUokpRMQOJx2BeUqpTYp5xE5uwXd3PEjDcwjFi0NwME9hRgE005Ajk8wNW';

    const params       = new URLSearchParams(window.location.search);
    const clientSecret = params.get('client_secret');
    const amount       = params.get('amount');
    const currency     = (params.get('currency') || 'usd').toLowerCase();

    // Mostrar monto y moneda de inmediato
    if (amount) {
      document.getElementById('amount-display').textContent =
        new Intl.NumberFormat('en-US', { style: 'currency', currency: currency.toUpperCase() })
          .format(parseInt(amount) / 100);
    }
    document.getElementById('currency-badge').textContent = currency.toUpperCase();

    if (!clientSecret) {
      document.getElementById('skeleton').style.display = 'none';
      document.getElementById('error-screen').style.display = 'block';
    } else {
      // Esperar a que Stripe.js cargue (ya viene con async)
      function initStripe() {
        if (typeof Stripe === 'undefined') {
          setTimeout(initStripe, 100);
          return;
        }

        const stripe   = Stripe(STRIPE_PK);
        const elements = stripe.elements({ clientSecret });
        const paymentElement = elements.create('payment', {
          layout: { type: 'tabs', defaultCollapsed: false }
        });

        paymentElement.on('ready', () => {
          document.getElementById('skeleton').style.display = 'none';
          document.getElementById('form-container').style.display = 'block';
        });

        paymentElement.on('loaderror', () => {
          document.getElementById('skeleton').style.display = 'none';
          document.getElementById('error-screen').style.display = 'block';
        });

        paymentElement.mount('#payment-element');

        document.getElementById('submit-btn').addEventListener('click', async () => {
          const btn    = document.getElementById('submit-btn');
          const errDiv = document.getElementById('error-message');

          btn.disabled = true;
          btn.innerHTML = '<span class="spinner"></span> Procesando...';
          errDiv.style.display = 'none';

          const { error, paymentIntent } = await stripe.confirmPayment({
            elements,
            confirmParams: { return_url: window.location.href },
            redirect: 'if_required'
          });

          if (error) {
            errDiv.textContent = error.message;
            errDiv.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Pagar ahora';
          } else {
            document.getElementById('success-message').style.display = 'block';
            btn.style.display = 'none';

            const msg = {
              type:            'PAYMENT_SUCCESS',
              clientSecret,
              paymentIntentId: paymentIntent?.id ?? null,
              currency,
              amount:          amount ? parseInt(amount) : null,
              saveCard:        true
            };

            window.parent.postMessage(msg, '*');
            if (window.flutter_inappwebview) {
              window.flutter_inappwebview.callHandler('paymentSuccess', msg);
            }
          }
        });
      }

      initStripe();
    }
  </script>
</body>
</html>
