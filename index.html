<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pago Seguro</title>

  <script src="https://js.stripe.com/v3/"></script>

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:#f5f3ff;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:12px;
    }

    .card{
      width:100%;
      max-width:400px;
      background:#fff;
      border-radius:14px;
      padding:20px;
      box-shadow:0 4px 18px rgba(108,71,255,.12);
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:14px;
    }

    h2{
      font-size:20px;
      color:#1a1033;
      font-weight:700;
    }

    .amount{
      color:#6c47ff;
      font-size:28px;
      font-weight:700;
      margin-bottom:14px;
    }

    #payment-element{
      margin-bottom:14px;
    }

    button{
      width:100%;
      border:none;
      border-radius:10px;
      background:#6c47ff;
      color:#fff;
      height:48px;
      font-size:15px;
      font-weight:600;
      cursor:pointer;
      transition:.2s;
    }

    button:hover{
      background:#5636eb;
    }

    button:disabled{
      background:#a094d8;
      cursor:not-allowed;
    }

    #error-message,
    #success-message{
      display:none;
      margin-top:12px;
      padding:10px 12px;
      border-radius:8px;
      font-size:14px;
    }

    #error-message{
      background:#fef2f2;
      color:#dc2626;
    }

    #success-message{
      background:#ecfdf5;
      color:#059669;
      text-align:center;
    }

    .secure{
      text-align:center;
      color:#9ca3af;
      font-size:11px;
      margin-top:12px;
    }

    #loading{
      text-align:center;
      padding:24px 0;
      color:#6b7280;
      font-size:14px;
    }

    .spinner{
      display:inline-block;
      width:16px;
      height:16px;
      border:2px solid #ddd6fe;
      border-top-color:#6c47ff;
      border-radius:50%;
      animation:spin .7s linear infinite;
      vertical-align:middle;
      margin-right:6px;
    }

    @keyframes spin{
      to{transform:rotate(360deg)}
    }

    #form-container{
      display:none;
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="top">
      <h2>Pago Seguro 🔒</h2>
    </div>

    <div class="amount" id="amount-display">$0.00</div>

    <div id="loading">
      <span class="spinner"></span>
      Cargando...
    </div>

    <div id="form-container">

      <div id="payment-element"></div>

      <button id="submit-btn">
        Pagar ahora
      </button>

      <div id="error-message"></div>

      <div id="success-message">
        ✅ ¡Pago exitoso!
      </div>

      <div class="secure">
        Procesado con Stripe
      </div>

    </div>

  </div>

  <script>
    const STRIPE_PK =
      'pk_test_51LLPZSAyqyVgaUlbXbj2SLEI5GSm4ja4tiz7mJB2gUokpRMQOJx2BeUqpTYp5xE5uwXd3PEjDcwjFi0NwME9hRgE005Ajk8wNW';

    const stripe = Stripe(STRIPE_PK);

    const params = new URLSearchParams(window.location.search);

    const clientSecret = params.get('client_secret');
    const amount = params.get('amount');

    if (amount) {
      document.getElementById('amount-display').textContent =
        new Intl.NumberFormat('en-US', {
          style: 'currency',
          currency: 'USD'
        }).format(parseInt(amount) / 100);
    }

    if (!clientSecret) {

      document.getElementById('loading').innerHTML =
        '⚠️ Error cargando el pago';

    } else {

      const elements = stripe.elements({
        clientSecret
      });

      const paymentElement = elements.create('payment', {
        layout: 'tabs'
      });

      paymentElement.on('ready', () => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('form-container').style.display = 'block';
      });

      paymentElement.mount('#payment-element');

      document
        .getElementById('submit-btn')
        .addEventListener('click', async () => {

          const btn = document.getElementById('submit-btn');
          const errDiv = document.getElementById('error-message');

          btn.disabled = true;

          btn.innerHTML =
            '<span class="spinner"></span>Procesando';

          errDiv.style.display = 'none';

          const { error, paymentIntent } =
            await stripe.confirmPayment({
              elements,
              confirmParams: {
                return_url: window.location.href
              },
              redirect: 'if_required'
            });

          if (error) {

            errDiv.textContent = error.message;
            errDiv.style.display = 'block';

            btn.disabled = false;
            btn.textContent = 'Pagar ahora';

          } else {

            document.getElementById(
              'success-message'
            ).style.display = 'block';

            btn.style.display = 'none';

            const msg = {
              type: 'PAYMENT_SUCCESS',
              clientSecret,
              paymentIntentId: paymentIntent?.id ?? null,
              saveCard: true
            };

            window.parent.postMessage(msg, '*');

            if (window.flutter_inappwebview) {
              window.flutter_inappwebview.callHandler(
                'paymentSuccess',
                msg
              );
            }
          }
        });
    }
  </script>

</body>
</html>
